name: Release

on:
  workflow_call:
    inputs:
      tag:
        required: true
        type: string

permissions:
  contents: write

jobs:
  Build:
    strategy:
      matrix:
        build:
          # (Runner image, binary-name)
          - [ubuntu-latest, miasma-linux-x86_64]
          - [ubuntu-24.04-arm, miasma-linux-arm64]
          - [macos-latest, miasma-apple-silicon]
          - [macos-26-intel, miasma-macOS-x86_64]
          - [windows-latest, miasma-windows-x86_64.exe]
          - [windows-11-arm, miasma-windows-arm64.exe]
    runs-on: ${{ matrix.build[0] }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}

      - name: Build Binary
        run: cargo build --profile tiny

      - name: Move Binary Windows
        if: runner.os == 'Windows'
        run: Move-Item -Path target\tiny\miasma.exe -Destination "${{ matrix.build[1] }}" -Force

      - name: Move Binary Unix
        if: runner.os != 'Windows'
        run: mv target/tiny/miasma ${{ matrix.build[1] }}

      - name: Upload Binary
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.build[1] }}
          path: ${{ matrix.build[1] }}
          overwrite: true

  Release:
    runs-on: ubuntu-latest
    needs: Build
    steps:
      - name: Download Binaries
        uses: actions/download-artifact@v6
        with:
          path: dist

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
          tag_name: ${{ inputs.tag }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
